server:
  port: 8089

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: movie_review
  mvc:
    static-path-pattern: /static/**
  freemarker:
    expose-session-attributes: true

  #  DB
  datasource:
    url: jdbc:h2:./db/movie_review;AUTO_SERVER=TRUE
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.h2.Driver
  #  sql:
  #    init:
  #      mode: always
  jpa:
    hibernate:
      ddl-auto: validate

  liquibase:
    change-log: classpath:/db/changelog/master.yaml

logging:
  file:
    path: logs
  level:
    org:
      springframework:
        security: debug
    kg.attractor.movie_review: debug
    com.zaxxer.hikari: error
    org.apache.tomcat: error
    liquibase: error
    root: info
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n"